name: "Setup Embedded Dependencies"
description: "Install dependencies required for embedded QEMU tests"
inputs:
  skip-package-update:
    description: "Skip brew/apt package index update when a prior setup step already updated it"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Install macOS embedded dependencies
      if: runner.os == 'macOS'
      shell: bash
      env:
        HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
      run: |
        if [[ "${{ inputs.skip-package-update }}" != "true" ]]; then
          brew update
        fi
        brew install sdl2

    - name: Install Ubuntu embedded dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if [[ "${{ inputs.skip-package-update }}" != "true" ]]; then
          sudo apt-get update
        fi
        sudo apt-get install -y libsdl2-2.0-0

    - name: Install ESP QEMU toolchains
      shell: bash
      run: |
        chmod +x .github/workflows/install-esp-qemu.sh
        QEMU_DIR=".cache/qemu"
        .github/workflows/install-esp-qemu.sh "$QEMU_DIR"
        qemu_bin="${PWD}/${QEMU_DIR}/bin"
        echo "$qemu_bin" >> $GITHUB_PATH
        "$qemu_bin/qemu-system-riscv32" --version
        "$qemu_bin/qemu-system-xtensa" --version
