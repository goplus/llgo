name: "Setup Go"
description: "Setup Go environment by downloading and extracting from go.dev"
inputs:
  go-version:
    description: "The Go version to download and use"
    required: true
runs:
  using: "composite"
  steps:
    - name: Cache macOS Go build artifacts
      if: runner.os == 'macOS'
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/Library/Caches/go-build
        key: ${{ runner.os }}-${{ runner.arch }}-go-${{ inputs.go-version }}-${{ hashFiles('go.sum') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-go-${{ inputs.go-version }}-

    - name: Download and setup Go
      shell: bash
      run: |
        set -e
        GO_VERSION="${{ inputs.go-version }}"
        GO_VERSION="${GO_VERSION#go}" # Remove 'go' prefix if present

        if command -v go >/dev/null 2>&1 && go version | grep -q "go${GO_VERSION} "; then
          echo "Go ${GO_VERSION} already available on PATH; skipping download"
          go version
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          exit 0
        fi
        if [ -x /usr/local/go/bin/go ] && /usr/local/go/bin/go version | grep -q "go${GO_VERSION} "; then
          echo "Go ${GO_VERSION} already available in /usr/local/go; skipping download"
          /usr/local/go/bin/go version
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "$(/usr/local/go/bin/go env GOPATH)/bin" >> $GITHUB_PATH
          exit 0
        fi

        # Determine OS and architecture
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          OS="darwin"
          # Use uname -m to detect actual CPU architecture
          # macos-15-intel runners report x86_64, others report arm64
          if [[ "$(uname -m)" == "x86_64" ]]; then
            ARCH="amd64"
          else
            ARCH="arm64"
          fi
        else
          OS="linux"
          ARCH="amd64"
        fi

        DOWNLOAD_URL="https://go.dev/dl/go${GO_VERSION}.${OS}-${ARCH}.tar.gz"
        echo "Downloading Go from: ${DOWNLOAD_URL}"

        # Create temporary directory for download
        TMP_DIR=$(mktemp -d)
        curl --retry 5 --retry-all-errors --retry-delay 5 -fL "${DOWNLOAD_URL}" -o "${TMP_DIR}/go.tar.gz"

        # Remove existing Go installation if any
        sudo rm -rf /usr/local/go

        # Extract to /usr/local
        sudo tar -C /usr/local -xzf "${TMP_DIR}/go.tar.gz"

        # Clean up
        rm -rf "${TMP_DIR}"

        # Add to PATH
        echo "/usr/local/go/bin" >> $GITHUB_PATH
        echo "$HOME/go/bin" >> $GITHUB_PATH

        echo "Verifying Go installation..."
        /usr/local/go/bin/go version
