# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: LLGo

on:
  push:
    branches:
      - "**"
      - "!dependabot/**"
      - "!xgopilot/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  download-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download model file
        run: |
          mkdir -p ./_demo/c/llama2-c
          wget -P ./_demo/c/llama2-c https://huggingface.co/karpathy/tinyllamas/resolve/main/stories15M.bin

      - name: Upload model as artifact
        uses: actions/upload-artifact@v7
        with:
          name: llama2-model
          path: ./_demo/c/llama2-c/stories15M.bin
          retention-days: 1

  llgo:
    needs: download-model
    continue-on-error: true
    # macOS Intel is much slower than macOS ARM in the "Test demos" step.
    # Observed: macOS ARM about 2m49s vs macOS Intel about 10m26s.
    # Keep a larger budget to avoid timeout-related cancellations.
    timeout-minutes: 60
    strategy:
      matrix:
        os:
          - macos-latest
          - macos-15-intel
          - ubuntu-latest
        llvm: [19]
        go: ["1.21.13", "1.24.2"]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
      - name: Install embedded dependencies
        uses: ./.github/actions/setup-embed-deps
        with:
          skip-package-update: "true"
      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: llama2-model
          path: ./_demo/c/llama2-c/
      - name: Download platform-specific demo libs
        run: |
          if ${{ startsWith(matrix.os, 'macos') }}; then
            # Use uname -m to detect actual CPU architecture
            if [[ "$(uname -m)" == "x86_64" ]]; then
              DEMO_PKG="cargs_darwin_amd64.zip"
            else
              DEMO_PKG="cargs_darwin_arm64.zip"
            fi
          else
            DEMO_PKG="cargs_linux_amd64.zip"
          fi

          mkdir -p ./_demo/c/cargs/libs
          cd ./_demo/c/cargs/libs
          wget https://github.com/goplus/llpkg/releases/download/cargs/v1.0.0/${DEMO_PKG}
          unzip -q ${DEMO_PKG}

          # Process pc template files - replace {{.Prefix}} with actual path
          ACTUAL_PREFIX="$(pwd)"
          for tmpl in lib/pkgconfig/*.pc.tmpl; do
            pc_file="${tmpl%.tmpl}"
            sed "s|{{.Prefix}}|${ACTUAL_PREFIX}|g" "$tmpl" > "$pc_file"
          done

          echo "PKG_CONFIG_PATH=${ACTUAL_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
      - name: Install further optional dependencies for demos
        run: |
          py_deps=(
            numpy # for github.com/goplus/lib/py/numpy
          )
          if [ "$RUNNER_OS" = "Linux" ]; then
            # Keep torch on Linux where ./_demo/py/tensor runs. Current macOS
            # jobs skip that demo because python3 cannot import the pip3.12 torch.
            py_deps+=(torch) # for github.com/goplus/lib/py/torch
          fi
          pip3.12 install --disable-pip-version-check --break-system-packages "${py_deps[@]}"

      - name: Set up Go for build
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install
        run: |
          # Keep ./... here: this job intentionally validates host package builds
          # across the OS/LLVM/Go matrix before running the LLGo demo suite.
          go install ./...
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Set up Go for testing
        if: ${{ matrix.go != '1.24.2' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{matrix.go}}

      - name: Test demo without RPATH (expect failure)
        if: ${{ matrix.os != 'macos-15-intel' }}
        run: |
          echo "Testing demo without RPATH (should fail)..."
          export LLGO_FULL_RPATH=false
          pkg-config --libs cargs
          if (cd ./_demo/c/cargs && llgo run .); then
            echo "ERROR: cargs demo should have failed without RPATH!"
            exit 1
          else
            echo "✓ cargs demo correctly failed without RPATH"
          fi

      - name: Test demos
        if: ${{ matrix.os != 'macos-15-intel' }}
        run: |
          # TODO(lijie): force python3-embed to be linked with python-3.12-embed
          # Currently, python3-embed is python-3.13-embed, doesn't work with pytorch
          # Will remove this after pytorch is fixed.
          pcdir=$HOME/pc
          mkdir -p $pcdir
          libdir=$(pkg-config --variable=libdir python-3.12-embed)
          echo "libdir: $libdir"
          ln -s $libdir/pkgconfig/python-3.12-embed.pc $pcdir/python3-embed.pc
          export PKG_CONFIG_PATH=$pcdir:${PKG_CONFIG_PATH}
          export LLGO_FULL_RPATH=true
          bash .github/workflows/test_demo.sh

      - name: Test demos (embedded target)
        if: ${{ matrix.os != 'macos-15-intel' }}
        env:
          # Host demo parallelism previously exposed a _demo/go/sync segfault on
          # Ubuntu Go 1.21. Keep host demos sequential. macOS Intel embedded demos
          # run in a separate job so both host and embedded tasks target <15m.
          LLGO_DEMO_JOBS: "1"
        run: bash .github/workflows/test_demo.sh --embedded

      - name: Test C header generation
        run: |
          echo "Testing C header generation in different build modes..."
          cd _demo/go/export
          ./test.sh

      - name: Test export with different symbol names on embedded targets
        if: ${{ matrix.os != 'macos-15-intel' }}
        run: |
          echo "Testing //export with different symbol names on embedded targets..."
          cd _demo/embed/export
          ./verify_export.sh

      - name: Test ESP serial smoke (build + emulator)
        if: ${{ matrix.os != 'macos-15-intel' }}
        run: |
          echo "Testing ESP32/ESP32-C3 build + emulator smoke..."
          cd _demo/embed
          ./test-esp-serial-startup.sh

      - name: Test ESP32-C3 startup regression
        if: ${{ matrix.os != 'macos-15-intel' }}
        run: |
          echo "Testing ESP32-C3 startup regressions..."
          pip3 install --disable-pip-version-check --break-system-packages esptool==5.1.0
          cd _demo/embed
          ./test_esp32c3_startup.sh

      - name: _xtool build tests
        run: |
          cd _xtool
          llgo build ./...

      - name: Show test result
        run: cat result.md

      - name: LLDB tests
        if: ${{ startsWith(matrix.os, 'macos') && matrix.os != 'macos-15-intel' }}
        run: |
          echo "Test lldb with llgo plugin on ${{matrix.os}} with LLVM ${{matrix.llvm}}"
          bash _lldb/runtest.sh -v

  llgo-host-demos-macos-intel:
    needs: download-model
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        llvm: [19]
        go: ["1.21.13", "1.24.2"]
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
      - name: Download model artifact
        uses: actions/download-artifact@v8
        with:
          name: llama2-model
          path: ./_demo/c/llama2-c/
      - name: Download platform-specific demo libs
        run: |
          DEMO_PKG="cargs_darwin_amd64.zip"
          mkdir -p ./_demo/c/cargs/libs
          cd ./_demo/c/cargs/libs
          wget https://github.com/goplus/llpkg/releases/download/cargs/v1.0.0/${DEMO_PKG}
          unzip -q ${DEMO_PKG}

          ACTUAL_PREFIX="$(pwd)"
          for tmpl in lib/pkgconfig/*.pc.tmpl; do
            pc_file="${tmpl%.tmpl}"
            sed "s|{{.Prefix}}|${ACTUAL_PREFIX}|g" "$tmpl" > "$pc_file"
          done

          echo "PKG_CONFIG_PATH=${ACTUAL_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
      - name: Install further optional dependencies for demos
        run: |
          py_deps=(
            numpy # for github.com/goplus/lib/py/numpy
          )
          pip3.12 install --disable-pip-version-check --break-system-packages "${py_deps[@]}"

      - name: Set up Go for build
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install llgo
        run: |
          # The main macOS Intel llgo job keeps go install ./... for host package
          # build coverage. This split job only runs host demos.
          go install ./cmd/llgo
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Set up Go for testing
        if: ${{ matrix.go != '1.24.2' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{matrix.go}}

      - name: Test demo without RPATH (expect failure)
        run: |
          echo "Testing demo without RPATH (should fail)..."
          export LLGO_FULL_RPATH=false
          pkg-config --libs cargs
          if (cd ./_demo/c/cargs && llgo run .); then
            echo "ERROR: cargs demo should have failed without RPATH!"
            exit 1
          else
            echo "✓ cargs demo correctly failed without RPATH"
          fi

      - name: Test demos
        run: |
          pcdir=$HOME/pc
          mkdir -p $pcdir
          libdir=$(pkg-config --variable=libdir python-3.12-embed)
          echo "libdir: $libdir"
          ln -s $libdir/pkgconfig/python-3.12-embed.pc $pcdir/python3-embed.pc
          export PKG_CONFIG_PATH=$pcdir:${PKG_CONFIG_PATH}
          export LLGO_FULL_RPATH=true
          bash .github/workflows/test_demo.sh

      - name: Show test result
        run: cat result.md

  llgo-embedded-macos-intel:
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - llvm: 19
            go: "1.21.13"
            target: esp32
          - llvm: 19
            go: "1.21.13"
            target: esp32c3-basic
            shard_index: "0"
            shard_total: "2"
          - llvm: 19
            go: "1.21.13"
            target: esp32c3-basic
            shard_index: "1"
            shard_total: "2"
          - llvm: 19
            go: "1.24.2"
            target: esp32
          - llvm: 19
            go: "1.24.2"
            target: esp32c3-basic
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false
      - name: Install embedded dependencies
        uses: ./.github/actions/setup-embed-deps
        with:
          skip-package-update: "true"
      - name: Set up Go for build
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install llgo
        run: |
          # The main macOS Intel llgo job keeps go install ./... for host package
          # build coverage. This split job only runs embedded demos, so install
          # the llgo command needed for those tests.
          go install ./cmd/llgo
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Set up Go for testing
        if: ${{ matrix.go != '1.24.2' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{matrix.go}}

      - name: Test demos (embedded target)
        env:
          # Each split job runs one embedded target. Keep Go 1.21 sequential;
          # low parallelism only helped the Go 1.24 leg in live CI.
          LLGO_DEMO_JOBS: ${{ matrix.go == '1.24.2' && '2' || '1' }}
          LLGO_EMBEDDED_TARGETS: ${{ matrix.target }}
          LLGO_DEMO_SHARD_INDEX: ${{ matrix.shard_index }}
          LLGO_DEMO_SHARD_TOTAL: ${{ matrix.shard_total }}
        run: bash .github/workflows/test_demo.sh --embedded

  llgo-embedded-smoke-macos-intel:
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - llvm: 19
            go: "1.21.13"
            smoke: export
          - llvm: 19
            go: "1.21.13"
            smoke: esp32-serial
          - llvm: 19
            go: "1.21.13"
            smoke: esp32c3-serial
            case_shard_index: "0"
            case_shard_total: "2"
          - llvm: 19
            go: "1.21.13"
            smoke: esp32c3-serial
            case_shard_index: "1"
            case_shard_total: "2"
          - llvm: 19
            go: "1.21.13"
            smoke: startup
          - llvm: 19
            go: "1.24.2"
            smoke: export
          - llvm: 19
            go: "1.24.2"
            smoke: esp32-serial
          - llvm: 19
            go: "1.24.2"
            smoke: esp32c3-serial
          - llvm: 19
            go: "1.24.2"
            smoke: startup
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false
      - name: Install embedded dependencies
        uses: ./.github/actions/setup-embed-deps
        with:
          skip-package-update: "true"
      - name: Set up Go for build
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install llgo
        run: |
          # The main macOS Intel llgo job keeps go install ./... for host package
          # build coverage. This split job only runs embedded smoke checks.
          go install ./cmd/llgo
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Set up Go for testing
        if: ${{ matrix.go != '1.24.2' }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{matrix.go}}

      - name: Test export with different symbol names on embedded targets
        if: ${{ matrix.smoke == 'export' }}
        run: |
          echo "Testing //export with different symbol names on embedded targets..."
          cd _demo/embed/export
          ./verify_export.sh

      - name: Test ESP32 serial smoke (build + emulator)
        if: ${{ matrix.smoke == 'esp32-serial' }}
        env:
          LLGO_ESP_SERIAL_TARGETS: esp32
        run: |
          echo "Testing ESP32 build + emulator smoke..."
          cd _demo/embed
          ./test-esp-serial-startup.sh

      - name: Test ESP32-C3 serial smoke (build + emulator)
        if: ${{ matrix.smoke == 'esp32c3-serial' }}
        env:
          LLGO_ESP_SERIAL_TARGETS: esp32c3-basic
          LLGO_ESP_SERIAL_CASE_SHARD_INDEX: ${{ matrix.case_shard_index }}
          LLGO_ESP_SERIAL_CASE_SHARD_TOTAL: ${{ matrix.case_shard_total }}
        run: |
          echo "Testing ESP32-C3 build + emulator smoke..."
          cd _demo/embed
          ./test-esp-serial-startup.sh

      - name: Test ESP32-C3 startup regression
        if: ${{ matrix.smoke == 'startup' }}
        run: |
          echo "Testing ESP32-C3 startup regressions..."
          pip3 install --disable-pip-version-check --break-system-packages esptool==5.1.0
          cd _demo/embed
          ./test_esp32c3_startup.sh

  test:
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        llvm: [19]
        shard: ["0", "1", "2", "3"]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false
      - name: Set up Go for build
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install
        run: |
          # Keep ./... here: this shard job intentionally validates host package
          # builds before running the LLGo test packages.
          go install ./...
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: run llgo test
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: "4"
        run: |
          set -euo pipefail

          pkgs=()
          while IFS= read -r pkg; do
            pkgs+=("${pkg}")
          done < <(go list -tags=llgo ./test/... | sort)

          selected=()
          for i in "${!pkgs[@]}"; do
            if (( i % SHARD_TOTAL == SHARD_INDEX )); then
              selected+=("${pkgs[$i]}")
            fi
          done

          echo "Shard: ${SHARD_INDEX}/${SHARD_TOTAL}, selected: ${#selected[@]} package(s)"
          if [ "${#selected[@]}" -eq 0 ]; then
            echo "No packages in this shard."
            exit 0
          fi
          printf '  %s\n' "${selected[@]}"

          # Run per-package and print elapsed time to keep logs readable.
          for pkg in "${selected[@]}"; do
            echo "==> llgo test -timeout=20m ${pkg}"
            SECONDS=0
            llgo test -timeout=20m "${pkg}"
            echo "==> done ${pkg} (${SECONDS}s)"
          done

  hello:
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        llvm: [19]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false

      - name: Set up Go for building llgo
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install llgo
        run: |
          # Keep ./... here: this smoke job also provides host package build
          # coverage on both Ubuntu and macOS runners.
          go install ./...
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Test Hello World with go.mod 1.24
        uses: ./.github/actions/test-helloworld
        with:
          go-version: "1.24.2"
          mod-version: "1.24"

  cross-compile:
    continue-on-error: true
    timeout-minutes: 30
    strategy:
      matrix:
        os: [macos-latest]
        llvm: [19]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false

      - name: Set up Go for building llgo
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Install wamr
        run: |
          git clone --branch WAMR-2.4.4 --depth 1 https://github.com/bytecodealliance/wasm-micro-runtime.git
          mkdir wasm-micro-runtime/product-mini/platforms/darwin/build
          cd wasm-micro-runtime/product-mini/platforms/darwin/build
          cmake -D WAMR_BUILD_EXCE_HANDLING=1 -D WAMR_BUILD_FAST_INTERP=0 -DWAMR_BUILD_SHARED_MEMORY=1 -DWAMR_BUILD_LIB_WASI_THREADS=1 -DCMAKE_BUILD_TYPE=Debug -DWAMR_BUILD_DEBUG_INTERP=1 ..
          make -j8
          echo "$PWD" >> $GITHUB_PATH

      - name: Install llgo
        run: |
          # Keep ./... here: the cross-compile job doubles as a macOS host
          # package build coverage point before wasm smoke tests.
          go install ./...
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Test Cross Compilation (wasm)
        shell: bash
        working-directory: _demo/c
        run: |
          echo "Testing cross-compilation wasm with Go 1.24.2"

          # Compile for wasm architecture
          GOOS=wasip1 GOARCH=wasm llgo build -o hello -tags=nogc -v ./helloc

          # Check file type
          file hello.wasm

          # Run the wasm binary using llgo_wasm
          iwasm --stack-size=819200000 --heap-size=800000000 hello.wasm
