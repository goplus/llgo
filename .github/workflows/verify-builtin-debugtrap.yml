name: verify-builtin-debugtrap

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang python3 xz-utils

      - name: Download ESP clang
        env:
          ESP_CLANG_URL: https://github.com/goplus/espressif-llvm-project-prebuilt/releases/download/19.1.2_20250905-3/clang-esp-19.1.2_20250905-3-x86_64-linux-gnu.tar.xz
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/esp-clang-root"
          curl -L "$ESP_CLANG_URL" -o "$RUNNER_TEMP/esp-clang.tar.xz"
          tar -xf "$RUNNER_TEMP/esp-clang.tar.xz" -C "$RUNNER_TEMP/esp-clang-root"
          ESP_CLANG_BIN="$(find "$RUNNER_TEMP/esp-clang-root" -path '*/bin/clang' | head -n 1)"
          if [ -z "$ESP_CLANG_BIN" ]; then
            echo "ESP clang binary not found after extraction" >&2
            exit 1
          fi
          echo "ESP_CLANG=$ESP_CLANG_BIN" >> "$GITHUB_ENV"

      - name: Show compiler versions
        run: |
          clang --version
          "$ESP_CLANG" --version

      - name: Verify __builtin_debugtrap across all targets
        run: bash _demo/embed/targetsbuild/verify_builtin_debugtrap.sh
