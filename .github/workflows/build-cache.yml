# Build cache tests for llgo
# Tests various build configurations to ensure cache works correctly

name: Build Cache

on:
  push:
    branches:
      - "**"
      - "!dependabot/**"
      - "!xgopilot/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-cache:
    timeout-minutes: 30
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        llvm: [19]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{matrix.llvm}}
          install-demo-deps: false

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.24.2"

      - name: Cache iwasm
        id: cache-iwasm
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/llgo/bin/iwasm
            ~/Library/Caches/llgo/bin/iwasm
          key: ${{ runner.os }}-${{ runner.arch }}-iwasm-WAMR-2.4.4-${{ hashFiles('dev/build_iwasm.sh') }}

      - name: Install wamr (for wasm tests)
        if: steps.cache-iwasm.outputs.cache-hit != 'true'
        run: bash dev/build_iwasm.sh

      - name: Add iwasm to PATH
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "$HOME/Library/Caches/llgo/bin" >> $GITHUB_PATH
          else
            echo "${XDG_CACHE_HOME:-$HOME/.cache}/llgo/bin" >> $GITHUB_PATH
          fi

      - name: Install llgo (dev mode)
        run: |
          go install -tags=dev ./cmd/llgo
          echo "LLGO_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Run build cache tests
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            pip3 install --disable-pip-version-check --break-system-packages esptool==5.1.0
          fi
          bash test/buildcache/test.sh
