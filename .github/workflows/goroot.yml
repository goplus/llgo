name: GOROOT

on:
  push:
    branches:
      - "**"
      - "!dependabot/**"
      - "!xgopilot/**"
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  goroot:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
        llvm: [19]
        shard: ["0", "1", "2", "3"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: ${{ matrix.llvm }}

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          go-version: "1.25.0"

      - name: Show toolchain versions
        run: |
          go version
          clang --version

      - name: Run GOROOT runner shard
        run: |
          bash dev/test_goroot.sh -- \
            -shard-index "${{ matrix.shard }}" \
            -shard-total 4
